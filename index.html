<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0f1117" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Voice Timer" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <title>Voice Timer</title>
  <style>
    :root {
      --bg: #0f1117;
      --panel: #181b24;
      --text: #e7e9ee;
      --muted: #8b91a3;
      --accent: #4ade80;
      --paused: #facc15;
      --idle: #475569;
      --error: #f87171;
      --border: #262a36;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
    }
    main {
      max-width: 520px;
      margin: 0 auto;
      padding:
        calc(48px + env(safe-area-inset-top))
        calc(24px + env(safe-area-inset-right))
        calc(48px + env(safe-area-inset-bottom))
        calc(24px + env(safe-area-inset-left));
    }
    h1 {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 32px;
      text-align: center;
    }
    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 16px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--idle);
      transition: background 0.2s ease;
    }
    .dot.running { background: var(--accent); box-shadow: 0 0 12px var(--accent); }
    .dot.paused  { background: var(--paused); }
    .dot.error   { background: var(--error); }
    .timer {
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 96px;
      font-weight: 200;
      letter-spacing: 0.04em;
      text-align: center;
      line-height: 1.1;
      margin: 8px 0 12px;
    }
    .transcript {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      min-height: 18px;
      margin-bottom: 28px;
      font-style: italic;
    }
    .controls {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 32px;
    }
    button {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    button:hover { background: #21253018; border-color: #3a4050; }
    button:active { transform: translateY(1px); }
    .history {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }
    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .history-header h2 {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0;
    }
    .history-header button {
      padding: 4px 10px;
      font-size: 12px;
      color: var(--muted);
    }
    .history ul {
      list-style: none;
      margin: 0;
      padding: 0;
      max-height: 200px;
      overflow-y: auto;
    }
    .history li {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 14px;
    }
    .history li:last-child { border-bottom: none; }
    .history li .when { color: var(--muted); font-size: 12px; }
    .empty {
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      padding: 12px 0;
    }
    .banner {
      background: #2d1820;
      border: 1px solid #7a2638;
      color: #fca5a5;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 24px;
      text-align: center;
    }
    .banner.hidden { display: none; }
  </style>
</head>
<body>
  <main>
    <h1>Voice Timer</h1>

    <div id="banner" class="banner hidden"></div>

    <div class="status">
      <span id="dot" class="dot"></span>
      <span id="statusLabel">Initializing…</span>
    </div>

    <div id="timer" class="timer">00:00</div>
    <div id="transcript" class="transcript">&nbsp;</div>

    <div class="controls">
      <button id="btnGo">Go</button>
      <button id="btnStop">Stop</button>
      <button id="btnFinish">Finish</button>
    </div>

    <div class="history">
      <div class="history-header">
        <h2>History</h2>
        <button id="btnClear">Clear</button>
      </div>
      <ul id="historyList"></ul>
      <div id="historyEmpty" class="empty">No runs yet — say "go" to start.</div>
    </div>
  </main>

  <script>
    const STORAGE_KEY = 'voice-timer-history';

    const els = {
      timer: document.getElementById('timer'),
      transcript: document.getElementById('transcript'),
      dot: document.getElementById('dot'),
      statusLabel: document.getElementById('statusLabel'),
      banner: document.getElementById('banner'),
      btnGo: document.getElementById('btnGo'),
      btnStop: document.getElementById('btnStop'),
      btnFinish: document.getElementById('btnFinish'),
      btnClear: document.getElementById('btnClear'),
      historyList: document.getElementById('historyList'),
      historyEmpty: document.getElementById('historyEmpty'),
    };

    let state = 'idle';
    let startTime = 0;
    let accumulatedMs = 0;
    let tickHandle = null;
    let history = loadHistory();
    let wakeLock = null;

    async function acquireWakeLock() {
      if (!('wakeLock' in navigator)) return;
      if (wakeLock) return;
      try {
        wakeLock = await navigator.wakeLock.request('screen');
        wakeLock.addEventListener('release', () => { wakeLock = null; });
      } catch (e) {
        // Browser may refuse if page isn't visible or no user gesture yet.
      }
    }
    async function releaseWakeLock() {
      if (!wakeLock) return;
      try { await wakeLock.release(); } catch {}
      wakeLock = null;
    }
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && state === 'running') {
        acquireWakeLock();
      }
    });

    function formatTime(ms) {
      const totalSeconds = Math.floor(ms / 1000);
      const mm = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
      const ss = String(totalSeconds % 60).padStart(2, '0');
      return `${mm}:${ss}`;
    }

    function currentMs() {
      return state === 'running' ? accumulatedMs + (Date.now() - startTime) : accumulatedMs;
    }

    function render() {
      els.timer.textContent = formatTime(currentMs());
      els.dot.className = 'dot';
      if (state === 'running') {
        els.dot.classList.add('running');
      } else if (state === 'paused') {
        els.dot.classList.add('paused');
      }
    }

    function startTick() {
      if (tickHandle) return;
      tickHandle = setInterval(render, 100);
    }
    function stopTick() {
      if (tickHandle) clearInterval(tickHandle);
      tickHandle = null;
    }

    function onGo() {
      if (state === 'running') return;
      startTime = Date.now();
      state = 'running';
      startTick();
      acquireWakeLock();
      render();
    }

    function onStop() {
      if (state !== 'running') return;
      accumulatedMs += Date.now() - startTime;
      state = 'paused';
      stopTick();
      render();
    }

    function onFinish() {
      if (state === 'idle' && accumulatedMs === 0) return;
      if (state === 'running') accumulatedMs += Date.now() - startTime;
      const finalMs = accumulatedMs;
      stopTick();
      releaseWakeLock();
      history.unshift({ ms: finalMs, at: Date.now() });
      saveHistory();
      renderHistory();
      state = 'idle';
      accumulatedMs = 0;
      startTime = 0;
      render();
    }

    function loadHistory() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }
    function saveHistory() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
    }
    function renderHistory() {
      els.historyList.innerHTML = '';
      if (history.length === 0) {
        els.historyEmpty.style.display = 'block';
        return;
      }
      els.historyEmpty.style.display = 'none';
      for (const entry of history) {
        const li = document.createElement('li');
        const time = document.createElement('span');
        time.textContent = formatTime(entry.ms);
        const when = document.createElement('span');
        when.className = 'when';
        when.textContent = new Date(entry.at).toLocaleString();
        li.appendChild(time);
        li.appendChild(when);
        els.historyList.appendChild(li);
      }
    }

    els.btnGo.addEventListener('click', onGo);
    els.btnStop.addEventListener('click', onStop);
    els.btnFinish.addEventListener('click', onFinish);
    els.btnClear.addEventListener('click', () => {
      history = [];
      saveHistory();
      renderHistory();
    });

    renderHistory();
    render();

    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    function showBanner(msg) {
      els.banner.textContent = msg;
      els.banner.classList.remove('hidden');
    }
    function hideBanner() {
      els.banner.classList.add('hidden');
    }
    function setStatus(label, kind) {
      els.statusLabel.textContent = label;
      if (kind === 'error') {
        els.dot.className = 'dot error';
      }
    }

    if (!Recognition) {
      showBanner('Speech recognition is not supported in this browser. Try Chrome, Edge, or Safari.');
      setStatus('Voice unavailable', 'error');
    } else {
      const recog = new Recognition();
      recog.continuous = true;
      recog.interimResults = true;
      recog.lang = 'en-US';

      let lastHandledIndex = -1;
      let restartGuardTimer = null;
      let permissionDenied = false;
      let networkBackoffMs = 0;
      const NETWORK_BACKOFF_START = 1000;
      const NETWORK_BACKOFF_MAX = 10000;

      recog.onstart = () => {
        hideBanner();
        networkBackoffMs = 0;
        setStatus('Listening…');
      };

      recog.onerror = (event) => {
        if (event.error === 'not-allowed' || event.error === 'service-not-allowed') {
          permissionDenied = true;
          showBanner('Microphone access was denied. Grant permission and reload to use voice commands.');
          setStatus('Mic blocked', 'error');
        } else if (event.error === 'network') {
          networkBackoffMs = networkBackoffMs
            ? Math.min(networkBackoffMs * 2, NETWORK_BACKOFF_MAX)
            : NETWORK_BACKOFF_START;
          showBanner(
            'Speech recognition service is unreachable. The Web Speech API needs internet ' +
            '(Chrome/Edge stream audio to Google). Check connection, VPN, or try Chrome. ' +
            `Retrying in ${Math.round(networkBackoffMs / 1000)}s…`
          );
          setStatus('Network error', 'error');
        } else if (event.error === 'no-speech' || event.error === 'aborted') {
          // benign — recognizer will auto-restart via onend
        } else {
          setStatus(`Error: ${event.error}`, 'error');
        }
      };

      recog.onend = () => {
        if (permissionDenied) return;
        clearTimeout(restartGuardTimer);
        const delay = networkBackoffMs || 300;
        restartGuardTimer = setTimeout(() => {
          try { recog.start(); } catch { /* already started */ }
        }, delay);
      };

      recog.onresult = (event) => {
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const result = event.results[i];
          const text = result[0].transcript.toLowerCase().trim();
          if (text) {
            els.transcript.textContent = `"${text}"`;
          }
          if (!result.isFinal && i <= lastHandledIndex) continue;

          if (/\bfinish\b/.test(text)) {
            onFinish();
            lastHandledIndex = i;
          } else if (/\bstop\b/.test(text)) {
            onStop();
            lastHandledIndex = i;
          } else if (/\bgo\b/.test(text)) {
            onGo();
            lastHandledIndex = i;
          }
        }
      };

      try {
        recog.start();
      } catch (e) {
        setStatus('Could not start mic', 'error');
      }
    }
  </script>
</body>
</html>
